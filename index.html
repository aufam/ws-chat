<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Boost Beast Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .chat {
      width: 100%;
      max-width: 700px;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 80vh;
    }

    .topbar {
      background: #374151;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-size: 14px;
    }

    .online {
      color: #10b981;
    }

    .offline {
      color: #ef4444;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      background: #374151;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .mine {
      align-self: flex-end;
      background: #2563eb;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #374151;
    }

    input {
      border: none;
      border-radius: 8px;
      padding: 12px;
      background: #111827;
      color: white;
    }

    #username {
      width: 140px;
    }

    #messageInput {
      flex: 1;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="chat">
    <div class="topbar">
      <h3>Boost Beast Chat</h3>
      <div id="status" class="status offline"> Disconnected </div>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <input id="username" type="text" placeholder="Username" value="guest" />
      <input id="messageInput" type="text" placeholder="Type message..." />
      <button onclick="sendMessage()"> Send </button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");

    let ws = null;

    function connect() {
      ws = new WebSocket("ws://localhost:3000");

      ws.onopen = () => {
        statusEl.textContent = "Connected";
        statusEl.className = "status online";
      };

      ws.onclose = () => {
        statusEl.textContent = "Disconnected";
        statusEl.className = "status offline";

        setTimeout(connect, 1000);
      };

      ws.onerror = (err) => {
        console.error(err);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          addMessage(
            data.username,
            data.message,
            false
          );
        } catch {
          addSystemMessage(event.data);
        }
      };
    }

    function addMessage(username, message, mine) {
      const div = document.createElement("div");
      div.className = "msg" + (mine ? " mine" : "");
      div.innerHTML = `<strong>${username}</strong><br>${message}`;

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = text;

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMessage() {
      const username = document.getElementById("username").value.trim() || "guest";

      const text = messageInput.value.trim();
      if (!text)
        return;

      const payload = {
        username,
        message: text
      };

      ws.send(JSON.stringify(payload));

      addMessage(
        username,
        text,
        true
      );

      messageInput.value = "";
    }

    messageInput.addEventListener(
      "keydown",
      (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      }
    );

    connect();
  </script>
</body>

</html>
